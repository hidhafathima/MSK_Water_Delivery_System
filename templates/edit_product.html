<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - MSK Water Delivery v2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 520px;
            margin: 40px auto;
            padding: 20px;
        }
        nav { margin-bottom: 20px; }
        nav a { color: #007bff; margin-right: 8px; }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Place Order</a>
        <a href="{{ url_for('track') }}">Track Order</a>
        <a href="{{ url_for('admin') }}">Admin Dashboard</a>
        <a href="{{ url_for('admin_products') }}">Manage Products</a>
    </nav>

    <h1>Edit Product</h1>

    <form method="POST">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required>

        <label for="price">Price ($)</label>
        <input type="number" id="price" name="price" min="0.01" step="0.01" value="{{ product.price }}" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="2">{{ product.description or '' }}</textarea>

        <label>
            <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}>
            Product is active (visible to customers)
        </label>

        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
